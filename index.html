<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11183c">
  <title>Fruit Slice AI — Hand-Controlled Arcade Game</title>
  <link rel="stylesheet" href="web/style.css">
</head>
<body>
  <main class="app-shell">
    <canvas id="game" width="1280" height="720" aria-label="Fruit Slice AI game"></canvas>
    <section id="cameraGate" class="camera-gate">
      <div class="gate-card">
        <span class="emoji">🍉</span>
        <h1>Fruit Slice AI</h1>
        <p>Use your index finger as a virtual sword. Camera access is required to play.</p>
        <button id="startCamera">Enable camera &amp; play</button>
        <small>Your camera stays in your browser. No video is uploaded.</small>
      </div>
    </section>
  </main>
  <video id="webcam" autoplay playsinline muted></video>
  <script type="module" src="web/app.js"></script>
</body>
</html>
